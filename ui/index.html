<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Manager Widget</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="widget-container">
        <!-- Header -->
        <div class="header">
            <div class="title">
                <i class="fa-solid fa-bolt" style="color: var(--accent); margin-right: 5px;"></i> Tools
            </div>
            <div class="header-actions">
                <div class="theme-menu-container" style="position: relative; -webkit-app-region: no-drag;">
                    <button class="icon-btn" onclick="toggleThemeMenu()" title="Escolher Tema"><i class="fa-solid fa-palette"></i></button>
                    <div id="themeMenu" style="display: none; position: absolute; top: 120%; right: 0; background: rgba(20, 20, 26, 0.98); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; width: 140px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); backdrop-filter: blur(10px);">
                        <div style="font-size: 11px; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; font-weight: 600; text-align: center;">Escolha a Vibe</div>
                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; justify-items: center;">
                            <div class="theme-swatch" style="background: rgb(0, 229, 255);" onclick="setTheme('0, 229, 255'); toggleThemeMenu();" title="Neon Cyan"></div>
                            <div class="theme-swatch" style="background: rgb(255, 0, 255);" onclick="setTheme('255, 0, 255'); toggleThemeMenu();" title="Cyberpunk"></div>
                            <div class="theme-swatch" style="background: rgb(0, 255, 170);" onclick="setTheme('0, 255, 170'); toggleThemeMenu();" title="Matrix"></div>
                            <div class="theme-swatch" style="background: rgb(255, 136, 0);" onclick="setTheme('255, 136, 0'); toggleThemeMenu();" title="Volcano"></div>
                            <div class="theme-swatch" style="background: rgb(255, 74, 74);" onclick="setTheme('255, 74, 74'); toggleThemeMenu();" title="Ruby"></div>
                            <div class="theme-swatch" style="background: rgb(255, 215, 0);" onclick="setTheme('255, 215, 0'); toggleThemeMenu();" title="Gold"></div>
                            <div class="theme-swatch" style="background: rgb(155, 89, 182);" onclick="setTheme('155, 89, 182'); toggleThemeMenu();" title="Amethyst"></div>
                            <div class="theme-swatch" style="background: rgb(255, 255, 255);" onclick="setTheme('255, 255, 255'); toggleThemeMenu();" title="Monochrome"></div>
                        </div>
                    </div>
                </div>
                <button class="icon-btn" id="pinBtn" onclick="togglePin()" title="Fixar Janela (Always on top)"><i class="fa-solid fa-thumbtack"></i></button>
                <button class="icon-btn" onclick="openAddModal()" title="Adicionar"><i class="fa-solid fa-plus"></i></button>
                <button class="icon-btn" onclick="window.api.minimize()" title="Esconder na Bandeja"><i class="fa-solid fa-minus"></i></button>
                <button class="icon-btn" onclick="quitApp()" title="Encerrar Totalmente"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>

        <!-- Premium System Dashboard -->
        <div class="system-dashboard">
            <div class="dash-main">
                <div class="dash-time" id="dashTime" title="Horário Local Atual">--:--:--</div>
                <div class="dash-weather" id="dashWeather" title="Clima e Temperatura (Baseado na sua localização)"><i class="fa-solid fa-cloud"></i> --°C</div>
            </div>
            <div class="dash-metrics">
                <div class="metric-chip" title="Processador (CPU): Mostra a porcentagem atual de uso do seu processador."><i class="fa-solid fa-microchip"></i> <span id="dashCpu">--%</span></div>
                <div class="metric-chip" title="Memória RAM: Mostra a porcentagem de memória do sistema ocupada no momento."><i class="fa-solid fa-memory"></i> <span id="dashRam">--%</span></div>
                <div class="metric-chip" title="Armazenamento de Disco: Mostra o percentual de espaço utilizado (somando todos os seus HDs/SSDs)."><i class="fa-solid fa-hard-drive"></i> <span id="dashDisk">--%</span></div>
            </div>
        </div>

        <!-- Tool List -->
        <div class="tool-list" id="tool-list-container">
            <!-- Items Injected via JS -->
        </div>
    </div>

    <!-- Add Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-header">
                Adicionar Ferramenta
                <i class="fa-solid fa-xmark close-icon" onclick="closeAddModal()"></i>
            </div>
            <div class="modal-body form-layout">
                <input type="hidden" id="toolId">
                
                <div class="form-section">Informações Básicas</div>
                <div class="form-group">
                    <label>Nome do Aplicativo <span class="required">*</span></label>
                    <input type="text" id="toolName" placeholder="Ex: Meu Servidor Node">
                </div>

                <div class="form-group">
                    <label>Comando de Execução <span class="required">*</span></label>
                    <div class="input-group">
                        <input type="text" id="toolCommand" placeholder="Ex: npm run dev, python main.py">
                        <button class="browse-btn" onclick="browseFile()" title="Procurar Arquivo"><i class="fa-solid fa-file"></i></button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Diretório Raiz (Opcional)</label>
                    <div class="input-group">
                        <input type="text" id="toolDir" placeholder="Onde o comando deve rodar?">
                        <button class="browse-btn" onclick="browseDir()" title="Selecionar Pasta"><i class="fa-solid fa-folder-open"></i></button>
                    </div>
                </div>

                <div class="form-section">Configurações Inteligentes</div>
                <div class="checkbox-group">
                    <label class="check-label" title="Inicia a ferramenta automaticamente ao abrir o Tool Manager">
                        <input type="checkbox" id="toolAutoStart">
                        <div class="check-text">
                            <strong>Auto-Start</strong>
                            <span>Iniciar com o app</span>
                        </div>
                    </label>
                    <label class="check-label" title="Acha uma porta livre (8080+) e passa como a variável PORT">
                        <input type="checkbox" id="toolAutoPort">
                        <div class="check-text">
                            <strong style="color: var(--accent);">Auto-Port</strong>
                            <span>Gerar porta dinâmica</span>
                        </div>
                    </label>
                </div>

                <details class="advanced-options">
                    <summary><i class="fa-solid fa-sliders"></i> Opções Avançadas</summary>
                    <div class="advanced-content">
                        <div class="form-group">
                            <label>Atalho de Teclado Global</label>
                            <div style="display: flex; gap: 8px;">
                                <input type="text" id="toolHotkey" placeholder="Nenhum atalho definido" readonly style="cursor: default;">
                                <button type="button" id="recordHotkeyBtn" onclick="toggleHotkeyRecord()" class="btn" style="padding: 0 15px; border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid rgba(255,255,255,0.1);">Gravar</button>
                                <button type="button" onclick="clearHotkey()" class="btn" style="padding: 0 15px; border-radius: 8px; background: rgba(255,74,74,0.1); color: var(--danger); border: 1px solid rgba(255,74,74,0.2);" title="Limpar Atalho"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </div>
                    </div>
                </details>
            </div>
            <button class="btn btn-primary" onclick="addTool()">Salvar</button>
        </div>
    </div>

    <!-- Logs Modal -->
    <div class="modal-overlay" id="logsModal">
        <div class="modal logs-modal" style="width: 500px; max-width: 90vw;">
            <div class="modal-header">
                Logs: <span id="logsToolName"></span>
                <i class="fa-solid fa-xmark close-icon" onclick="closeLogsModal()"></i>
            </div>
            <div class="modal-body" style="padding: 0;">
                <div id="logsConsole" style="background: #0c0c0c; color: #00ffaa; font-family: 'Courier New', Courier, monospace; height: 300px; overflow-y: auto; padding: 10px; font-size: 12px; white-space: pre-wrap; border-radius: 0 0 14px 14px;"></div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
