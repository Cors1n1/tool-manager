<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Manager - .env Editor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-panel: rgba(20, 20, 26, 0.6);
            --accent: #00e5ff;
            --text-primary: #f0f0f5;
            --text-dim: #8b8b99;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            -webkit-app-region: drag;
        }

        .header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-panel);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .env-row {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .env-row input {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            font-family: monospace;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            transition: 0.2s;
        }

        .env-row input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        .env-key {
            flex: 1;
        }

        .env-val {
            flex: 2;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            -webkit-app-region: no-drag;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn.primary {
            background: rgba(0, 229, 255, 0.1);
            color: var(--accent);
            border-color: rgba(0, 229, 255, 0.3);
        }

        .btn.primary:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        .btn.danger {
            background: rgba(255, 74, 74, 0.1);
            color: #ff4a4a;
            border-color: rgba(255, 74, 74, 0.2);
            padding: 8px 12px;
        }

        .btn.danger:hover {
            background: rgba(255, 74, 74, 0.2);
        }

        .footer {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fa-solid fa-bolt"></i> Variáveis de Ambiente</h2>
        <div style="display: flex; gap: 10px;">
            <button class="btn" onclick="window.close()" title="Fechar"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

    <div class="content" id="env-list">
        <!-- Injected via JS -->
    </div>

    <div class="footer">
        <button class="btn" onclick="addEnvRow()"><i class="fa-solid fa-plus"></i> Nova Variável</button>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span class="status" id="status-msg"></span>
            <button class="btn primary" onclick="saveEnvFile()"><i class="fa-solid fa-floppy-disk"></i> Salvar Alterações</button>
        </div>
    </div>

    <!-- App Hotkey Section -->
    <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
        <h3 style="margin: 0 0 10px 0; font-size: 14px; color: var(--accent);"><i class="fa-solid fa-keyboard"></i> Atalho Global (Minimizar/Abrir App)</h3>
        <p style="color: var(--text-dim); font-size: 12px; margin: 0 0 10px 0;">Atalho para esconder/mostrar o Tool Manager de qualquer lugar do PC.</p>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="appHotkeyInput" placeholder="Nenhum atalho" readonly style="flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: var(--text-primary); padding: 8px; border-radius: 6px; outline: none; cursor: default;">
            <button class="btn" id="recordAppHotkeyBtn" onclick="toggleAppHotkeyRecord()" style="background: rgba(255,255,255,0.05); color: var(--text-primary);">Gravar</button>
            <button class="btn danger" onclick="clearAppHotkey()" title="Limpar"><i class="fa-solid fa-trash"></i></button>
        </div>
    </div>

    <script src="env.js"></script>
</body>
</html>
